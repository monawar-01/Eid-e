<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salami Diben Koto? 💸</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f6e56 0%, #1d9e75 50%, #5dcaa5 100%);
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 { font-size: 26px; color: #0f6e56; margin-bottom: 6px; }
    .subtitle { font-size: 15px; color: #888; margin-bottom: 1.5rem; }
    .wheel-wrap {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto 1.5rem;
    }
    .pointer {
      position: absolute;
      top: -14px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 24px solid #D85A30;
      z-index: 10;
    }
    canvas { border-radius: 50%; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    .spin-btn {
      background: #1d9e75; color: white; border: none;
      padding: 14px 48px; font-size: 18px; font-weight: 600;
      border-radius: 50px; cursor: pointer; letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }
    .spin-btn:hover { background: #0f6e56; }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled { background: #ccc; cursor: not-allowed; }
    .result-card {
      display: none; margin-top: 1.5rem;
      background: #f0faf6; border: 1.5px solid #5dcaa5;
      border-radius: 16px; padding: 1.5rem;
      animation: popIn 0.4s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }
    .result-top { font-size: 32px; margin-bottom: 10px; }
    .result-msg {
      font-size: 15px; color: #333;
      line-height: 1.7; margin-bottom: 16px;
      white-space: pre-line;
    }
    .accept-btn {
      background: #1d9e75; color: #fff;
      border: none; padding: 10px 32px;
      border-radius: 50px; font-size: 15px;
      font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .accept-btn:hover { background: #0f6e56; }
    .accept-btn:active { transform: scale(0.97); }
    .accepted-msg {
      display: none;
      margin-top: 12px;
      font-size: 14px;
      color: #0f6e56;
      font-weight: 600;
    }
    .again-btn {
      display: none;
      margin-top: 10px;
      background: transparent;
      border: 1.5px solid #1d9e75; color: #1d9e75;
      padding: 8px 28px; border-radius: 50px;
      cursor: pointer; font-size: 14px;
      transition: background 0.2s;
    }
    .again-btn:hover { background: #e1f5ee; }
  </style>
</head>
<body>
<div class="card">
  <h1>সালামি পাবেন কতো? </h1>
  <p class="subtitle">স্পিন করুন এবং দেখুন কী পাবেন!</p>
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="280" height="280"></canvas>
  </div>
  <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN NOW!</button>
  <div class="result-card" id="resultCard">
    <div class="result-top">🤲</div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="accept-btn" id="acceptBtn" onclick="acceptDua()">Accept Dua</button>
    <div class="accepted-msg" id="acceptedMsg">✅ দোয়া কবুল হোক! আমিন 🤲</div>
    <button class="again-btn" id="againBtn" onclick="reset()">আবার স্পিন করুন</button>
  </div>
</div>

<script>
  const segments = [
    { label: "দোয়া", color: "#5DCAA5", textColor: "#085041", duaIndex: 0 },
    { label: "5 tk",  color: "#7F77DD", textColor: "#fff",    duaIndex: -1 },
    { label: "দোয়া", color: "#1D9E75", textColor: "#fff",    duaIndex: 1 },
    { label: "10 tk", color: "#378ADD", textColor: "#fff",    duaIndex: -1 },
    { label: "দোয়া", color: "#0f6e56", textColor: "#fff",    duaIndex: 2 },
    { label: "50 tk", color: "#E24B4A", textColor: "#fff",    duaIndex: -1 },
    { label: "2 tk",  color: "#EF9F27", textColor: "#fff",    duaIndex: -1 },
    { label: "100 tk",color: "#D4537E", textColor: "#fff",    duaIndex: -1 },
  ];

  const duaSlots = [0, 2, 4];
  let nextDuaOrder = 0;

  const duaMessages = [
    "আসসালামু আলাইকুম। সারা বছর কোনো খোঁজ-খবর থাকে না, আর এখন আসছেন সালামী নিতে! 😄\n\nখালি দোয়া হবে আপনাদের জন্য দোয়া — আনলিমিটেড দোয়া। 🤲",
    "আবার আসলেন? মাশাআল্লাহ! সালামী এখানে নেই ভাই, তবে দোয়া আনলিমিটেড আছে! 😄🤲",
    "তৃতীয়বার চেষ্টা? সাহস আছে বটে! কিন্তু ফলাফল একই — আনলিমিটেড দোয়া! 😂🤲"
  ];

  const canvas = document.getElementById('wheel');
  const ctx    = canvas.getContext('2d');
  const total  = segments.length;
  const arc    = (2 * Math.PI) / total;
  let currentAngle = 0;
  let spinning = false;

  // AudioContext সাউন্ড
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSpinSound(duration) {
    const oscillator = audioCtx.createOscillator();
    const gainNode   = audioCtx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
    oscillator.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + duration / 1000);
    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
    oscillator.start(audioCtx.currentTime);
    oscillator.stop(audioCtx.currentTime + duration / 1000);
  }

  function playTickSound() {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.05);
  }

  function playResultSound() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.15 + 0.3);
      osc.start(audioCtx.currentTime + i * 0.15);
      osc.stop(audioCtx.currentTime + i * 0.15 + 0.3);
    });
  }

  function getTargetAngle(slotIndex) {
    return -Math.PI / 2 - arc * slotIndex - arc / 2;
  }

  function drawWheel(angle) {
    ctx.clearRect(0, 0, 280, 280);
    const cx = 140, cy = 140, r = 136;

    for (let i = 0; i < total; i++) {
      const start = angle + i * arc;
      const end   = start + arc;

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end);
      ctx.closePath();
      ctx.fillStyle = segments[i].color;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      const midAngle = start + arc / 2;
      const labelR   = r * 0.65;
      const lx = cx + labelR * Math.cos(midAngle);
      const ly = cy + labelR * Math.sin(midAngle);

      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(midAngle + Math.PI / 2);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = segments[i].textColor;
      ctx.font         = 'bold 13px Segoe UI, sans-serif';
      ctx.fillText(segments[i].label, 0, 0);
      ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(cx, cy, 20, 0, 2 * Math.PI);
    ctx.fillStyle   = '#fff';
    ctx.fill();
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth   = 2;
    ctx.stroke();
  }

  drawWheel(currentAngle);

  function spin() {
    if (spinning) return;
    spinning = true;
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('acceptedMsg').style.display = 'none';
    document.getElementById('acceptBtn').style.display = 'inline-block';
    document.getElementById('againBtn').style.display = 'none';

    const targetSlot = duaSlots[nextDuaOrder % 3];
    const stopAngle  = getTargetAngle(targetSlot);
    const fullSpins  = (6 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
    let target = stopAngle + fullSpins;
    while (target <= currentAngle) target += 2 * Math.PI;

    const duration   = 4000;
    const startTime  = performance.now();
    const startAngle = currentAngle;

    // স্পিন সাউন্ড শুরু
    playSpinSound(duration);

    let lastTickAngle = currentAngle;

    function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

    function animate(now) {
      const elapsed  = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      currentAngle   = startAngle + (target - startAngle) * easeOut(progress);
      drawWheel(currentAngle);

      // টিক সাউন্ড — প্রতিটা ঘর পার হলে
      if (Math.floor(currentAngle / arc) !== Math.floor(lastTickAngle / arc)) {
        playTickSound();
        lastTickAngle = currentAngle;
      }

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        currentAngle = stopAngle;
        drawWheel(currentAngle);
        spinning = false;
        setTimeout(() => {
          playResultSound();
          showResult();
        }, 300);
      }
    }
    requestAnimationFrame(animate);
  }

  function showResult() {
    const msgIndex = nextDuaOrder % 3;
    document.getElementById('resultMsg').innerText = duaMessages[msgIndex];
    document.getElementById('resultCard').style.display = 'block';
    nextDuaOrder++;
  }

  function acceptDua() {
    document.getElementById('acceptBtn').style.display = 'none';
    document.getElementById('acceptedMsg').style.display = 'block';
    document.getElementById('againBtn').style.display = 'inline-block';
  }

  function reset() {
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('spinBtn').disabled = false;
  }
</script>
</body>
</html>
